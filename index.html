<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Барбершоп</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #ffd700; }
        .subtitle { color: #aaa; margin-bottom: 20px; font-size: 14px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #16213e;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #ffd700; }
        
        select, input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0f3460;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: inherit;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.danger { background: #e74c3c; color: white; }
        button.secondary { background: #3498db; color: white; }
        
        .master-card, .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #0f3460;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .master-card.selected, .service-item.selected { background: #ffd700; color: #1a1a2e; }
        
        .time-slots { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .time-slot {
            background: #0f3460;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
        }
        .time-slot.selected { background: #ffd700; color: #1a1a2e; }
        .time-slot.closed { background: #e74c3c; opacity: 0.7; text-decoration: line-through; }
        
        .booking-item {
            background: #0f3460;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .booking-time { font-size: 16px; font-weight: bold; color: #ffd700; }
        .booking-cancel {
            background: #e74c3c;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            margin-top: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        .stat-label { font-size: 12px; margin-top: 5px; }
        
        .login-form { text-align: center; }
        .hidden { display: none; }
        .info-text { text-align: center; padding: 20px; color: #888; }
        .error { color: #e74c3c; text-align: center; margin-top: 10px; }
        .success { color: #2ecc71; text-align: center; margin-top: 10px; }
        .loading { text-align: center; padding: 20px; color: #ffd700; }
        .date-badge {
            background: #ffd700;
            color: #1a1a2e;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✂️ BarberShop</h1>
        
        <div class="tabs">
            <div class="tab active" data-main-tab="booking">📝 Запись</div>
            <div class="tab" data-main-tab="admin">👨‍💼 Админ</div>
        </div>
        
        <!-- Вкладка: Запись -->
        <div id="booking-tab">
            <div class="card">
                <div class="card-title">👨‍🦰 Выбери мастера</div>
                <div id="masters-list"></div>
            </div>
            <div class="card">
                <div class="card-title">💇 Услуги</div>
                <div id="services-list"></div>
            </div>
            <div class="card">
                <div class="card-title">📅 Выбери дату</div>
                <input type="date" id="date-input">
            </div>
            <div class="card">
                <div class="card-title">⏰ Выбери время</div>
                <div id="time-slots" class="time-slots">
                    <div class="info-text">Сначала выберите мастера и дату</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">📞 Телефон (необязательно)</div>
                <input type="tel" id="phone-input" placeholder="+7 123 456-78-90">
            </div>
            <div class="card">
                <div class="card-title">💬 Комментарий</div>
                <textarea id="comment-input" rows="2" placeholder="Пожелания к стрижке..."></textarea>
            </div>
            <button id="submit-btn">✅ Записаться</button>
            <div id="booking-error" class="error hidden"></div>
            <div id="booking-success" class="success hidden"></div>
        </div>
        
        <!-- Вкладка: Админ -->
        <div id="admin-tab" class="hidden">
            <div id="admin-login" class="login-form">
                <div class="card">
                    <div class="card-title">🔐 Вход в админ-панель</div>
                    <input type="password" id="admin-password" placeholder="Пароль">
                    <button id="login-btn">Войти</button>
                    <div id="login-error" class="error hidden"></div>
                </div>
            </div>
            <div id="admin-panel" class="hidden">
                <div class="tabs">
                    <div class="tab active" data-admin-tab="all">📋 Все записи</div>
                    <div class="tab" data-admin-tab="today">📅 Сегодня</div>
                    <div class="tab" data-admin-tab="slots">⏰ Управление слотами</div>
                    <div class="tab" data-admin-tab="stats">📊 Статистика</div>
                </div>
                <div id="admin-content">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = "https://functions.yandexcloud.net/d4eho1fu83ho2dusd781";
        const ADMIN_PASSWORD = "admin123";
        
        const masters = [
            { id: "Алексей", name: "Алексей", spec: "Топ-мастер, 8 лет опыта", avatar: "✂️" },
            { id: "Дмитрий", name: "Дмитрий", spec: "Борода и усы, 5 лет", avatar: "🧔" },
            { id: "Максим", name: "Максим", spec: "Молодежные стрижки", avatar: "💈" }
        ];
        const services = [
            { id: 1, name: "Мужская стрижка", price: 1500 },
            { id: 2, name: "Борода (моделирование)", price: 1000 },
            { id: 3, name: "Стрижка + борода", price: 2200 },
            { id: 4, name: "Камуфляж седины", price: 800 }
        ];
        
        let selectedMaster = null;
        let selectedService = null;
        let selectedDate = "";
        let selectedTime = null;
        let availableSlots = [];
        let allBookings = [];
        
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date-input').min = tomorrow.toISOString().split('T')[0];
        
        // ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
        document.querySelectorAll('[data-main-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.mainTab;
                document.querySelectorAll('[data-main-tab]').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (tabName === 'booking') {
                    document.getElementById('booking-tab').classList.remove('hidden');
                    document.getElementById('admin-tab').classList.add('hidden');
                } else {
                    document.getElementById('booking-tab').classList.add('hidden');
                    document.getElementById('admin-tab').classList.remove('hidden');
                    document.getElementById('admin-login').classList.remove('hidden');
                    document.getElementById('admin-panel').classList.add('hidden');
                    document.getElementById('admin-password').value = '';
                    document.getElementById('login-error').classList.add('hidden');
                }
            });
        });
        
        // ============ АДМИН-ЛОГИН ============
        document.getElementById('login-btn').onclick = () => {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                showAllBookings();
            } else {
                document.getElementById('login-error').innerText = 'Неверный пароль';
                document.getElementById('login-error').classList.remove('hidden');
            }
        };
        
        // ============ АДМИН-ВКЛАДКИ ============
        document.querySelectorAll('[data-admin-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('[data-admin-tab]').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.adminTab;
                if (tabName === 'all') showAllBookings();
                else if (tabName === 'today') showTodayBookings();
                else if (tabName === 'slots') showSlotsManager();
                else if (tabName === 'stats') showStats();
            });
        });
        
        // ============ ЗАГРУЗКА ВСЕХ ЗАПИСЕЙ ============
        async function loadAllBookings() {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getAllBookings' })
            });
            const data = await response.json();
            allBookings = data.bookings || [];
            return allBookings;
        }
        
        // ============ ПОКАЗАТЬ ВСЕ ЗАПИСИ ============
        async function showAllBookings() {
            const container = document.getElementById('admin-content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllBookings();
            
            if (allBookings.length === 0) {
                container.innerHTML = '<div class="info-text">Нет записей</div>';
                return;
            }
            
            const grouped = {};
            allBookings.forEach(b => {
                if (!grouped[b.date]) grouped[b.date] = [];
                grouped[b.date].push(b);
            });
            
            let html = '';
            for (const [date, bookings] of Object.entries(grouped).sort().reverse()) {
                html += `<div class="date-badge">📆 ${date}</div>`;
                for (const b of bookings) {
                    html += `
                        <div class="booking-item" data-id="${b.booking_id}">
                            <div class="booking-time">${b.time}</div>
                            <div><strong>${b.client_name}</strong> — ${b.service}</div>
                            <div>👨‍🦰 Мастер: ${b.master}</div>
                            <div>💰 ${b.price}₽</div>
                            <div>📞 ${b.client_phone || 'не указан'}</div>
                            <div>💬 ${b.comment || 'без комментария'}</div>
                            <button class="booking-cancel" data-id="${b.booking_id}">❌ Отменить</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            attachCancelEvents();
        }
        
        // ============ ПОКАЗАТЬ ЗАПИСИ НА СЕГОДНЯ ============
        async function showTodayBookings() {
            const container = document.getElementById('admin-content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllBookings();
            
            const today = new Date().toISOString().split('T')[0];
            const todayBookings = allBookings.filter(b => b.date === today && b.status !== 'cancelled');
            
            if (todayBookings.length === 0) {
                container.innerHTML = '<div class="info-text">Нет записей на сегодня</div>';
                return;
            }
            
            let html = '';
            for (const b of todayBookings) {
                html += `
                    <div class="booking-item" data-id="${b.booking_id}">
                        <div class="booking-time">${b.time}</div>
                        <div><strong>${b.client_name}</strong> — ${b.service}</div>
                        <div>👨‍🦰 Мастер: ${b.master}</div>
                        <div>📞 ${b.client_phone || 'не указан'}</div>
                        <button class="booking-cancel" data-id="${b.booking_id}">❌ Отменить</button>
                    </div>
                `;
            }
            container.innerHTML = html;
            attachCancelEvents();
        }
        
        // ============ ОТМЕНА ЗАПИСИ ============
        function attachCancelEvents() {
            document.querySelectorAll('.booking-cancel').forEach(btn => {
                btn.onclick = async () => {
                    const bookingId = btn.dataset.id;
                    if (confirm('Отменить запись?')) {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'cancelBooking', bookingId: bookingId })
                        });
                        const result = await response.json();
                        if (result.success) {
                            alert('Запись отменена');
                            const activeTab = document.querySelector('[data-admin-tab].active').dataset.adminTab;
                            if (activeTab === 'all') showAllBookings();
                            else if (activeTab === 'today') showTodayBookings();
                        } else {
                            alert('Ошибка отмены');
                        }
                    }
                };
            });
        }
        
        // ============ УПРАВЛЕНИЕ СЛОТАМИ ============
        async function showSlotsManager() {
            const container = document.getElementById('admin-content');
            const mastersList = masters.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            const today = new Date().toISOString().split('T')[0];
            
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">👨‍🦰 Мастер</div>
                    <select id="slots-master">${mastersList}</select>
                </div>
                <div class="card">
                    <div class="card-title">📅 Дата</div>
                    <input type="date" id="slots-date" value="${today}">
                </div>
                <button id="load-slots-btn" class="secondary">Загрузить слоты</button>
                <div id="slots-editor" class="hidden">
                    <div class="card">
                        <div class="card-title">⏰ Нажми на слот, чтобы закрыть/открыть</div>
                        <div id="closed-slots-list" class="time-slots"></div>
                    </div>
                    <button id="save-slots-btn">💾 Сохранить настройки</button>
                </div>
                <div id="slots-message" class="hidden"></div>
            `;
            
            document.getElementById('load-slots-btn').onclick = async () => {
                const master = document.getElementById('slots-master').value;
                const date = document.getElementById('slots-date').value;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getClosedSlots', date, master })
                });
                const data = await response.json();
                let closedSlots = data.slots || [];
                
                const editor = document.getElementById('slots-editor');
                editor.classList.remove('hidden');
                
                const slotsContainer = document.getElementById('closed-slots-list');
                const allSlots = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'];
                
                slotsContainer.innerHTML = '';
                allSlots.forEach(slot => {
                    const span = document.createElement('span');
                    span.className = `time-slot ${closedSlots.includes(slot) ? 'closed' : ''}`;
                    span.innerText = slot;
                    span.onclick = () => {
                        if (closedSlots.includes(slot)) {
                            closedSlots = closedSlots.filter(s => s !== slot);
                            span.classList.remove('closed');
                        } else {
                            closedSlots.push(slot);
                            span.classList.add('closed');
                        }
                    };
                    slotsContainer.appendChild(span);
                });
                
                window.currentClosedSlots = closedSlots;
                window.currentMaster = master;
                window.currentDate = date;
            };
            
            document.getElementById('save-slots-btn')?.addEventListener('click', async () => {
                if (!window.currentClosedSlots) return;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'saveClosedSlots', 
                        date: window.currentDate, 
                        master: window.currentMaster, 
                        slots: window.currentClosedSlots 
                    })
                });
                const result = await response.json();
                const msgDiv = document.getElementById('slots-message');
                if (result.success) {
                    msgDiv.innerHTML = '<div class="success">✅ Слоты сохранены!</div>';
                } else {
                    msgDiv.innerHTML = '<div class="error">❌ Ошибка сохранения</div>';
                }
                msgDiv.classList.remove('hidden');
                setTimeout(() => msgDiv.classList.add('hidden'), 3000);
            });
        }
        
        // ============ СТАТИСТИКА ============
        async function showStats() {
            const container = document.getElementById('admin-content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getStats' })
            });
            const stats = await response.json();
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${stats.total || 0}</div><div class="stat-label">Всего записей</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.revenue || 0}₽</div><div class="stat-label">Выручка</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.topService ? stats.topService.name : '-'}</div><div class="stat-label">Самая популярная</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.topService ? stats.topService.count : 0}</div><div class="stat-label">Записей</div></div>
                </div>
            `;
        }
        
        // ============ КЛИЕНТСКАЯ ЧАСТЬ ============
        function renderMasters() {
            const container = document.getElementById('masters-list');
            container.innerHTML = '';
            masters.forEach(master => {
                const div = document.createElement('div');
                div.className = `master-card ${selectedMaster?.id === master.id ? 'selected' : ''}`;
                div.onclick = () => {
                    selectedMaster = master;
                    renderMasters();
                    if (selectedDate) loadFreeSlots();
                };
                div.innerHTML = `
                    <div style="font-size:24px">${master.avatar}</div>
                    <div style="flex:1"><strong>${master.name}</strong><br><small>${master.spec}</small></div>
                `;
                container.appendChild(div);
            });
        }
        
        function renderServices() {
            const container = document.getElementById('services-list');
            container.innerHTML = '';
            services.forEach(service => {
                const div = document.createElement('div');
                div.className = `service-item ${selectedService?.id === service.id ? 'selected' : ''}`;
                div.onclick = () => {
                    selectedService = service;
                    renderServices();
                };
                div.innerHTML = `
                    <span>${service.name}</span>
                    <span><strong>${service.price}₽</strong></span>
                `;
                container.appendChild(div);
            });
        }
        
        function renderTimeSlots() {
            const container = document.getElementById('time-slots');
            if (!selectedMaster) {
                container.innerHTML = '<div class="info-text">Сначала выберите мастера</div>';
                return;
            }
            if (!selectedDate) {
                container.innerHTML = '<div class="info-text">Сначала выберите дату</div>';
                return;
            }
            if (availableSlots.length === 0) {
                container.innerHTML = '<div class="info-text">Нет свободных слотов на эту дату</div>';
                return;
            }
            container.innerHTML = '';
            availableSlots.forEach(slot => {
                const span = document.createElement('span');
                span.className = `time-slot ${selectedTime === slot ? 'selected' : ''}`;
                span.innerText = slot;
                span.onclick = () => {
                    selectedTime = slot;
                    renderTimeSlots();
                };
                container.appendChild(span);
            });
        }
        
        async function loadFreeSlots() {
            if (!selectedMaster || !selectedDate) return;
            const container = document.getElementById('time-slots');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'getFreeSlots',
                        date: selectedDate,
                        masterId: selectedMaster.id
                    })
                });
                const data = await response.json();
                availableSlots = data.slots || [];
                renderTimeSlots();
            } catch (err) {
                container.innerHTML = '<div class="error">Ошибка загрузки</div>';
            }
        }
        
        async function submitBooking() {
            if (!selectedMaster || !selectedService || !selectedDate || !selectedTime) {
                showError('Заполните все поля!', 'booking');
                return;
            }
            
            const booking = {
                master: selectedMaster.name,
                service: selectedService.name,
                price: selectedService.price,
                date: selectedDate,
                time: selectedTime,
                client_name: tg.initDataUnsafe?.user?.first_name || 'Гость',
                client_username: tg.initDataUnsafe?.user?.username || '',
                client_id: tg.initDataUnsafe?.user?.id || 0,
                client_phone: document.getElementById('phone-input').value,
                comment: document.getElementById('comment-input').value
            };
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Отправка...';
            btn.disabled = true;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'book', booking: booking })
                });
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('✅ Запись создана! Ждём вас!', 'booking');
                    setTimeout(() => tg.close(), 2000);
                } else {
                    throw new Error('Ошибка');
                }
            } catch (err) {
                showError('Ошибка при записи', 'booking');
            } finally {
                btn.innerText = '✅ Записаться';
                btn.disabled = false;
            }
        }
        
        function showError(msg, type) {
            const el = document.getElementById('booking-error');
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        
        function showSuccess(msg, type) {
            const el = document.getElementById('booking-success');
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        
        document.getElementById('date-input').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            if (selectedMaster) loadFreeSlots();
        });
        document.getElementById('submit-btn').onclick = submitBooking;
        
        renderMasters();
        renderServices();
    </script>
</body>
</html>
