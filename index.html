<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Барбершоп - Админ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #ffd700; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #16213e;
            border-radius: 30px;
            cursor: pointer;
        }
        .tab.active {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
        }
        .booking-item {
            background: #0f3460;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .booking-time {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        .booking-cancel {
            background: #e74c3c;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            margin-top: 8px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        .login-form { text-align: center; }
        .hidden { display: none; }
        .info-text { text-align: center; padding: 20px; color: #888; }
        .error { color: #e74c3c; text-align: center; margin-top: 10px; }
        .loading { text-align: center; padding: 20px; color: #ffd700; }
        .admin-password {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0f3460;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .date-badge {
            background: #ffd700;
            color: #1a1a2e;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✂️ BarberShop Admin</h1>
        
        <div id="login-section">
            <div class="info-text">Введите пароль для входа</div>
            <input type="password" id="password-input" class="admin-password" placeholder="Пароль">
            <button id="login-btn">Войти</button>
            <div id="login-error" class="error hidden"></div>
        </div>
        
        <div id="admin-section" class="hidden">
            <div class="tabs">
                <div class="tab active" data-tab="all">📋 Все записи</div>
                <div class="tab" data-tab="today">📅 Сегодня</div>
                <div class="tab" data-tab="stats">📊 Статистика</div>
            </div>
            <div id="content">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = "https://functions.yandexcloud.net/d4eho1fu83ho2dusd781";
        const ADMIN_PASSWORD = "admin123";
        
        let allBookings = [];
        
        // Загрузка всех записей
        async function loadAllBookings() {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getAllBookings' })
            });
            const data = await response.json();
            allBookings = data.bookings || [];
            console.log('Загружено записей:', allBookings.length);
            return allBookings;
        }
        
        // Показать все записи
        async function showAllBookings() {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllBookings();
            
            if (allBookings.length === 0) {
                container.innerHTML = '<div class="info-text">Нет записей</div>';
                return;
            }
            
            // Группируем по дате
            const grouped = {};
            allBookings.forEach(b => {
                if (!grouped[b.date]) grouped[b.date] = [];
                grouped[b.date].push(b);
            });
            
            let html = '';
            for (const [date, bookings] of Object.entries(grouped).sort().reverse()) {
                html += `<div class="date-badge">📆 ${date}</div>`;
                for (const b of bookings) {
                    html += `
                        <div class="booking-item" data-id="${b.booking_id}">
                            <div class="booking-time">${b.time}</div>
                            <div><strong>${b.client_name}</strong> — ${b.service}</div>
                            <div>👨‍🦰 Мастер: ${b.master}</div>
                            <div>💰 ${b.price}₽</div>
                            <div>📞 ${b.client_phone || 'не указан'}</div>
                            <div>💬 ${b.comment || 'без комментария'}</div>
                            <button class="booking-cancel" data-id="${b.booking_id}">❌ Отменить</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            attachCancelEvents();
        }
        
        // Показать записи на сегодня
        async function showTodayBookings() {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllBookings();
            
            const today = new Date().toISOString().split('T')[0];
            const todayBookings = allBookings.filter(b => b.date === today && b.status !== 'cancelled');
            
            if (todayBookings.length === 0) {
                container.innerHTML = '<div class="info-text">Нет записей на сегодня</div>';
                return;
            }
            
            let html = '';
            for (const b of todayBookings) {
                html += `
                    <div class="booking-item" data-id="${b.booking_id}">
                        <div class="booking-time">${b.time}</div>
                        <div><strong>${b.client_name}</strong> — ${b.service}</div>
                        <div>👨‍🦰 Мастер: ${b.master}</div>
                        <div>📞 ${b.client_phone || 'не указан'}</div>
                        <button class="booking-cancel" data-id="${b.booking_id}">❌ Отменить</button>
                    </div>
                `;
            }
            container.innerHTML = html;
            attachCancelEvents();
        }
        
        // Показать статистику
        async function showStats() {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllBookings();
            
            const activeBookings = allBookings.filter(b => b.status !== 'cancelled');
            const total = activeBookings.length;
            const revenue = activeBookings.reduce((sum, b) => sum + (b.price || 0), 0);
            
            const serviceCount = {};
            activeBookings.forEach(b => {
                serviceCount[b.service] = (serviceCount[b.service] || 0) + 1;
            });
            const topService = Object.entries(serviceCount).sort((a, b) => b[1] - a[1])[0];
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Всего записей</div></div>
                    <div class="stat-card"><div class="stat-number">${revenue}₽</div><div class="stat-label">Выручка</div></div>
                    <div class="stat-card"><div class="stat-number">${topService ? topService[0] : '-'}</div><div class="stat-label">Самая популярная</div></div>
                    <div class="stat-card"><div class="stat-number">${topService ? topService[1] : 0}</div><div class="stat-label">Записей</div></div>
                </div>
            `;
        }
        
        function attachCancelEvents() {
            document.querySelectorAll('.booking-cancel').forEach(btn => {
                btn.onclick = async () => {
                    const bookingId = btn.dataset.id;
                    if (confirm('Отменить запись?')) {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'cancelBooking', bookingId: bookingId })
                        });
                        const result = await response.json();
                        if (result.success) {
                            alert('Запись отменена');
                            // Перезагружаем текущий вид
                            const activeTab = document.querySelector('[data-tab].active').dataset.tab;
                            if (activeTab === 'all') showAllBookings();
                            else if (activeTab === 'today') showTodayBookings();
                            else showStats();
                        } else {
                            alert('Ошибка отмены');
                        }
                    }
                };
            });
        }
        
        // Логин
        document.getElementById('login-btn').onclick = () => {
            const password = document.getElementById('password-input').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                showAllBookings();
            } else {
                document.getElementById('login-error').innerText = 'Неверный пароль';
                document.getElementById('login-error').classList.remove('hidden');
            }
        };
        
        // Переключение вкладок
        document.querySelectorAll('[data-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'all') showAllBookings();
                else if (tabName === 'today') showTodayBookings();
                else if (tabName === 'stats') showStats();
            });
        });
    </script>
</body>
</html>
