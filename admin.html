<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | Lamborghini Barbershop</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1f1f1f;
      padding-bottom: 16px;
    }
    .header h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: #f8c300; }
    .refresh-btn {
      background: #f8c300;
      color: #0a0a0a;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .refresh-btn:hover { opacity: 0.8; transform: scale(0.97); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 16px;
    }
    .stat-card .num { font-size: 32px; font-weight: 800; color: #f8c300; }
    .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .table-wrap {
      overflow-x: auto;
      background: #0f0f0f;
      border-radius: 16px;
      border: 1px solid #1a1a1a;
      padding: 4px 0;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 14px 16px;
      background: #181818;
      color: #f8c300;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      border-bottom: 1px solid #2a2a2a;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; color: #ddd; }
    tr:hover td { background: #141414; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      background: #1a3a2a;
      color: #8fcaa8;
    }
    .empty { text-align: center; padding: 60px 20px; color: #555; font-size: 16px; }
    .footer { margin-top: 32px; text-align: center; font-size: 11px; color: #333; letter-spacing: 1px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✂️ Lamborghini Admin</h1>
    <button class="refresh-btn" onclick="loadData()">↻ Обновить</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="table-wrap">
    <div id="tableContent"><div class="empty">⏳ Загрузка...</div></div>
  </div>
  <div class="footer">Lamborghini Barbershop · Админ-панель</div>
</div>

<script>
  const API_URL = 'https://functions.yandexcloud.net/d4e4p2aipckh173bon88';

  async function loadData() {
    const statsEl = document.getElementById('stats');
    const tableEl = document.getElementById('tableContent');
    tableEl.innerHTML = '<div class="empty">⏳ Загрузка...</div>';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getAll' })
      });
      const data = await res.json();

      if (data.bookings && data.bookings.length > 0) {
        const total = data.bookings.length;
        statsEl.innerHTML = `
          <div class="stat-card"><div class="num">${total}</div><div class="label">Всего записей</div></div>
          <div class="stat-card"><div class="num">${total}</div><div class="label">Активных</div></div>
        `;

        let rows = '';
        data.bookings.forEach(b => {
          rows += `
            <tr>
              <td>${b.id}</td>
              <td>${b.user_id || '—'}</td>
              <td>${b.service_name || '—'}</td>
              <td><span class="badge">${b.status || 'confirmed'}</span></td>
              <td>${b.created_at || '—'}</td>
            </tr>
          `;
        });

        tableEl.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>Клиент</th><th>Услуга</th><th>Статус</th><th>Дата</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } else {
        statsEl.innerHTML = '';
        tableEl.innerHTML = '<div class="empty">📭 Пока нет записей</div>';
      }
    } catch (e) {
      tableEl.innerHTML = `<div class="empty">❌ Ошибка: ${e.message}</div>`;
    }
  }

  loadData();
</script>
</body>
</html>
