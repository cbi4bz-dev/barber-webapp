<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Lamborghini Barbershop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #0f0f0f;
      border-radius: 40px;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 0 60px rgba(248, 195, 0, 0.15);
      border: 1px solid #1f1f1f;
      padding: 24px 20px 100px;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600') center/cover no-repeat;
      opacity: 0.1;
      filter: blur(4px);
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header .brand {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #f8c300;
      text-transform: uppercase;
    }

    .header .step-badge {
      font-size: 11px;
      color: #f8c300;
      background: rgba(248, 195, 0, 0.12);
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid rgba(248, 195, 0, 0.2);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .progress {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      border-radius: 4px;
      background: #262626;
      transition: background 0.5s ease;
    }

    .progress-bar.active {
      background: #f8c300;
      box-shadow: 0 0 12px rgba(248, 195, 0, 0.6);
    }

    .progress-bar.done {
      background: #f8c300;
      opacity: 0.4;
    }

    .screen-title {
      font-size: 12px;
      color: #f8c300;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .screen-subtitle {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .card:active {
      transform: scale(0.97);
    }

    .card.selected {
      border-color: #f8c300;
      background: rgba(248, 195, 0, 0.08);
      box-shadow: 0 0 40px rgba(248, 195, 0, 0.15);
    }

    .card .left {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    .card .right {
      text-align: right;
    }

    .card .price {
      font-size: 18px;
      font-weight: 700;
      color: #f8c300;
    }

    .card .duration {
      font-size: 11px;
      color: #888;
    }

    .card .arrow {
      color: #f8c300;
      font-size: 20px;
      margin-left: 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin: 12px 0 20px;
    }

    .cal-day {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px 0;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .cal-day:active {
      transform: scale(0.92);
    }

    .cal-day .day-name {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .cal-day.selected {
      border-color: #f8c300;
      background: rgba(248, 195, 0, 0.15);
      box-shadow: 0 0 30px rgba(248, 195, 0, 0.15);
    }

    .cal-day.past {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 10px 0 10px;
    }

    .time-slot {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 14px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .time-slot:active {
      transform: scale(0.94);
    }

    .time-slot.selected {
      border-color: #f8c300;
      background: rgba(248, 195, 0, 0.12);
      box-shadow: 0 0 30px rgba(248, 195, 0, 0.1);
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-top: auto;
      padding-top: 20px;
    }

    .btn-primary {
      flex: 1;
      background: #f8c300;
      color: #0a0a0a;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 40px rgba(248, 195, 0, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    .btn-primary:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      flex: 0.4;
      background: rgba(255, 255, 255, 0.06);
      color: #aaa;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-secondary:active {
      transform: scale(0.96);
    }

    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      animation: fadeSlide 0.4s ease;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeSlide {
      0% {
        opacity: 0;
        transform: translateY(16px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin: 16px 0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-weight: 700;
      color: #f8c300;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      font-size: 16px;
      color: #fff;
      box-sizing: border-box;
      margin: 12px 0;
    }

    input:focus {
      outline: none;
      border-color: #f8c300;
    }

    input::placeholder {
      color: #555;
    }

    .error {
      color: #ff3b30;
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 9px;
      color: #222;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="app">
    <div class="content">
      <div class="header">
        <span class="brand">Lamborghini</span>
        <span class="step-badge" id="stepBadge">Шаг 1 / 4</span>
      </div>

      <div class="progress" id="progress">
        <div class="progress-bar active" data-step="1"></div>
        <div class="progress-bar" data-step="2"></div>
        <div class="progress-bar" data-step="3"></div>
        <div class="progress-bar" data-step="4"></div>
      </div>

      <!-- ЭКРАН 1 -->
      <div id="screen1" class="screen active">
        <div class="screen-title">Шаг 1</div>
        <div class="screen-subtitle">Выбор мастера</div>
        <div id="mastersContainer"></div>
        <div class="nav-buttons">
          <button class="btn-secondary" onclick="resetAll()">Сброс</button>
          <button class="btn-primary" id="btnToScreen2" disabled onclick="goToScreen(2)">Далее →</button>
        </div>
      </div>

      <!-- ЭКРАН 2 -->
      <div id="screen2" class="screen">
        <div class="screen-title">Шаг 2</div>
        <div class="screen-subtitle">Выбор услуги</div>
        <div id="masterDisplay" style="font-size:13px; color:#888; margin-bottom:8px;"></div>
        <div id="servicesContainer"></div>
        <div class="nav-buttons">
          <button class="btn-secondary" onclick="goToScreen(1)">← Назад</button>
          <button class="btn-primary" id="btnToScreen3" disabled onclick="goToScreen(3)">Далее →</button>
        </div>
      </div>

      <!-- ЭКРАН 3 -->
      <div id="screen3" class="screen">
        <div class="screen-title">Шаг 3</div>
        <div class="screen-subtitle">Дата и время</div>
        <div id="serviceDisplay" style="font-size:13px; color:#888; margin-bottom:8px;"></div>
        <div style="font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Выберите дату</div>
        <div id="datesContainer" class="calendar-grid"></div>
        <div style="font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; margin:4px 0 4px;">Выберите время</div>
        <div id="timesContainer" class="time-grid"></div>
        <div class="nav-buttons">
          <button class="btn-secondary" onclick="goToScreen(2)">← Назад</button>
          <button class="btn-primary" id="btnToScreen4" disabled onclick="goToScreen(4)">Далее →</button>
        </div>
      </div>

      <!-- ЭКРАН 4 -->
      <div id="screen4" class="screen">
        <div class="screen-title">Шаг 4</div>
        <div class="screen-subtitle">Подтверждение</div>
        <div class="summary-card" id="bookingPreview"></div>
        <input type="tel" id="phone" placeholder="+7 (XXX) XXX-XX-XX" autocomplete="tel">
        <div id="errorMsg" class="error" style="display:none;"></div>
        <div class="nav-buttons">
          <button class="btn-secondary" onclick="goToScreen(3)">← Назад</button>
          <button class="btn-primary" onclick="submitBooking()">Готово</button>
        </div>
      </div>

      <!-- ЭКРАН 5 -->
      <div id="screen5" class="screen">
        <div class="screen-title">Запись подтверждена!</div>
        <div class="screen-subtitle" style="color:#f8c300;">Ждём вас</div>
        <div id="finalSummary" class="summary-card"></div>
        <button class="btn-primary" onclick="resetAll()" style="margin-top:8px;">➕ Новая запись</button>
        <div class="footer">Lamborghini Barbershop</div>
      </div>

    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    if (tg) {
      tg.expand();
      tg.enableClosingConfirmation();
    }

    const MASTERS = [
      { id: 1, name: 'Alex' },
      { id: 2, name: 'Mario' },
      { id: 3, name: 'Danil' }
    ];

    const SERVICES = [
      { id: 1, name: 'МУЖСКАЯ СТРИЖКА', price: 2500, duration: 60 },
      { id: 2, name: 'СТРИЖКА + БОРОДА', price: 3500, duration: 90 },
      { id: 3, name: 'КОРОЛЕВСКОЕ БРИТЬЁ', price: 2000, duration: 45 },
      { id: 4, name: 'ДЕТСКАЯ СТРИЖКА', price: 1800, duration: 45 },
      { id: 5, name: 'КАМУФЛЯЖ СЕДИНЫ', price: 2200, duration: 30 }
    ];

    const TIMES = ['10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '14:30', '15:00', '16:00', '17:00', '18:00'];

    let state = {
      master: null,
      service: null,
      date: null,
      time: null
    };

const SAVE_API = 'https://functions.yandexcloud.net/d4e4p2aipckh173bon88';
    const user = (tg && tg.initDataUnsafe?.user) || { id: 0, first_name: 'Гость' };

    function goToScreen(num) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(`screen${num}`).classList.add('active');
      updateProgress(num);
      updateBadge(num);
      window.scrollTo(0, 0);
    }

    function updateProgress(step) {
      document.querySelectorAll('.progress-bar').forEach((el, i) => {
        el.classList.remove('active', 'done');
        if (i + 1 < step) el.classList.add('done');
        if (i + 1 === step) el.classList.add('active');
      });
    }

    function updateBadge(step) {
      document.getElementById('stepBadge').innerText = `Шаг ${step} / 4`;
    }

    function renderMasters() {
      const container = document.getElementById('mastersContainer');
      container.innerHTML = '';
      MASTERS.forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<span class="left">${m.name}</span><span class="arrow">→</span>`;
        div.onclick = () => selectMaster(m.id);
        if (state.master?.id === m.id) div.classList.add('selected');
        container.appendChild(div);
      });
    }

    function renderServices() {
      const container = document.getElementById('servicesContainer');
      container.innerHTML = '';
      SERVICES.forEach(s => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <span class="left">${s.name}</span>
          <span class="right">
            <div class="duration">${s.duration} МИН</div>
            <div class="price">${s.price.toLocaleString()} ₽</div>
          </span>
        `;
        div.onclick = () => selectService(s.id);
        if (state.service?.id === s.id) div.classList.add('selected');
        container.appendChild(div);
      });
    }

    function renderDates() {
      const container = document.getElementById('datesContainer');
      container.innerHTML = '';
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      const monthNames = ['ЯНВ', 'ФЕВ', 'МАР', 'АПР', 'МАЙ', 'ИЮН', 'ИЮЛ', 'АВГ', 'СЕН', 'ОКТ', 'НОЯ', 'ДЕК'];

      const header = document.createElement('div');
      header.style.cssText =
        'grid-column:span 7; text-align:center; font-size:14px; font-weight:700; color:#f8c300; letter-spacing:2px; padding:4px 0;';
      header.textContent = `${monthNames[currentMonth]} ${currentYear}`;
      container.appendChild(header);

      const dayNames = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
      dayNames.forEach(name => {
        const div = document.createElement('div');
        div.style.cssText =
          'font-size:9px; color:#444; text-align:center; text-transform:uppercase; letter-spacing:0.5px; padding:4px 0;';
        div.textContent = name;
        container.appendChild(div);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const emptyDays = firstDay === 0 ? 6 : firstDay - 1;
      for (let i = 0; i < emptyDays; i++) {
        const div = document.createElement('div');
        div.style.visibility = 'hidden';
        container.appendChild(div);
      }

      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const todayDate = today.getDate();

      for (let i = 1; i <= daysInMonth; i++) {
        const div = document.createElement('div');
        div.className = 'cal-day';
        const dayNum = document.createElement('div');
        dayNum.style.fontSize = '16px';
        dayNum.style.fontWeight = '600';
        dayNum.textContent = i;
        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        const dayOfWeek = new Date(currentYear, currentMonth, i).getDay();
        dayName.textContent = dayNames[dayOfWeek === 0 ? 6 : dayOfWeek - 1];
        div.appendChild(dayNum);
        div.appendChild(dayName);
        const dateStr = `${i} ${dayName.textContent}`;
        if (i < todayDate) {
          div.classList.add('past');
        } else {
          div.onclick = () => selectDate(dateStr);
        }
        if (state.date === dateStr) div.classList.add('selected');
        container.appendChild(div);
      }
    }

    function renderTimes() {
      const container = document.getElementById('timesContainer');
      container.innerHTML = '';
      TIMES.forEach(t => {
        const div = document.createElement('div');
        div.className = 'time-slot';
        div.textContent = t;
        div.onclick = () => selectTime(t);
        if (state.time === t) div.classList.add('selected');
        container.appendChild(div);
      });
    }

    function selectMaster(id) {
      state.master = MASTERS.find(m => m.id === id);
      document.getElementById('masterDisplay').textContent = `💈 Мастер: ${state.master.name}`;
      document.getElementById('btnToScreen2').disabled = false;
      renderMasters();
    }

    function selectService(id) {
      state.service = SERVICES.find(s => s.id === id);
      document.getElementById('serviceDisplay').textContent = `✂️ ${state.service.name} — ${state.service.price} ₽`;
      document.getElementById('btnToScreen3').disabled = false;
      renderServices();
    }

    function selectDate(date) {
      state.date = date;
      renderDates();
      checkScreen3Ready();
    }

    function selectTime(time) {
      state.time = time;
      renderTimes();
      checkScreen3Ready();
    }

    function checkScreen3Ready() {
      document.getElementById('btnToScreen4').disabled = !(state.date && state.time);
    }

    function updatePreview() {
      const preview = document.getElementById('bookingPreview');
      preview.innerHTML = `
        <div class="summary-row"><span class="summary-label">Мастер</span><span class="summary-value">${state.master?.name || '—'}</span></div>
        <div class="summary-row"><span class="summary-label">Услуга</span><span class="summary-value">${state.service?.name || '—'}</span></div>
        <div class="summary-row"><span class="summary-label">Длительность</span><span class="summary-value">${state.service?.duration || 0} МИН</span></div>
        <div class="summary-row"><span class="summary-label">Стоимость</span><span class="summary-value">${state.service?.price?.toLocaleString() || 0} ₽</span></div>
        <div class="summary-row"><span class="summary-label">Дата</span><span class="summary-value">${state.date || '—'}</span></div>
        <div class="summary-row"><span class="summary-label">Время</span><span class="summary-value">${state.time || '—'}</span></div>
      `;
    }

    async function submitBooking() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) {
        document.getElementById('errorMsg').textContent = 'Введите номер телефона';
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }
      document.getElementById('errorMsg').style.display = 'none';

      const data = {
        master_id: state.master.id,
        master_name: state.master.name,
        service_id: state.service.id,
        service: state.service.name,
        price: state.service.price,
        duration: state.service.duration,
        date: state.date,
        time: state.time,
        phone: phone,
        user_id: user.id,
        first_name: user.first_name || ''
      };

      try {
        const response = await fetch(SAVE_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ web_app_data: { data: JSON.stringify(data) } })
        });
        const result = await response.json();

        if (result.ok) {
          document.getElementById('finalSummary').innerHTML = `
            <div class="summary-row"><span class="summary-label">Мастер</span><span class="summary-value">${data.master_name}</span></div>
            <div class="summary-row"><span class="summary-label">Услуга</span><span class="summary-value">${data.service}</span></div>
            <div class="summary-row"><span class="summary-label">Длительность</span><span class="summary-value">${data.duration} МИН</span></div>
            <div class="summary-row"><span class="summary-label">Стоимость</span><span class="summary-value">${data.price.toLocaleString()} ₽</span></div>
            <div class="summary-row"><span class="summary-label">Дата</span><span class="summary-value">${data.date}</span></div>
            <div class="summary-row"><span class="summary-label">Время</span><span class="summary-value">${data.time}</span></div>
            <div class="summary-row"><span class="summary-label">Телефон</span><span class="summary-value">${data.phone}</span></div>
          `;
          goToScreen(5);
        } else {
          throw new Error(result.error || 'Ошибка сохранения');
        }
      } catch (e) {
        document.getElementById('errorMsg').textContent = '❌ ' + e.message;
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    function resetAll() {
      state = { master: null, service: null, date: null, time: null };
      document.getElementById('phone').value = '';
      document.getElementById('errorMsg').style.display = 'none';
      renderMasters();
      renderServices();
      renderDates();
      renderTimes();
      document.getElementById('btnToScreen2').disabled = true;
      document.getElementById('btnToScreen3').disabled = true;
      document.getElementById('btnToScreen4').disabled = true;
      goToScreen(1);
    }

    document.querySelector('#btnToScreen4').addEventListener('click', updatePreview);

    renderMasters();
    renderServices();
    renderDates();
    renderTimes();
    document.getElementById('btnToScreen2').disabled = true;
    document.getElementById('btnToScreen3').disabled = true;
