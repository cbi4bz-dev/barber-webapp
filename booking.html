<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Запись в барбершоп</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
            transition: background 0.2s ease;
        }
        
        /* Progress Bar */
        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 4px;
        }
        .progress-step {
            flex: 1;
            height: 4px;
            background: var(--tg-theme-hint-color);
            border-radius: 4px;
            transition: background 0.3s ease;
            opacity: 0.3;
        }
        .progress-step.active {
            background: var(--tg-theme-button-color);
            opacity: 1;
        }
        .progress-step.done {
            background: var(--tg-theme-button-color);
            opacity: 0.5;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            color: var(--tg-theme-hint-color);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Карточки-опции */
        .option-card {
            background: var(--tg-theme-secondary-bg-color);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-card:active { transform: scale(0.98); }
        .option-card.selected {
            border-color: var(--tg-theme-button-color);
            background: var(--tg-theme-bg-color);
        }
        .option-card .price {
            font-weight: 700;
            color: var(--tg-theme-button-color);
        }
        .option-card .arrow {
            font-size: 18px;
            color: var(--tg-theme-hint-color);
        }

        /* Сетка для дат и времени */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .grid-item {
            background: var(--tg-theme-secondary-bg-color);
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .grid-item:active { transform: scale(0.95); }
        .grid-item.selected {
            border-color: var(--tg-theme-button-color);
            background: var(--tg-theme-bg-color);
        }
        .grid-item .day {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Кнопки навигации */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-primary {
            flex: 1;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.8; }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            flex: 0.5;
            background: transparent;
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-secondary:active { transform: scale(0.98); }

        /* Инпут */
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--tg-theme-hint-color);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            box-sizing: border-box;
            margin: 12px 0;
        }
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color);
        }

        /* Экраны */
        .screen {
            display: none;
            animation: slideIn 0.3s ease;
        }
        .screen.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Итоговое подтверждение */
        .summary-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { opacity: 0.7; }
        .summary-value { font-weight: 600; }

        .error { color: #ff3b30; font-size: 14px; margin-top: 8px; }
        .footer { margin-top: 24px; text-align: center; font-size: 12px; color: var(--tg-theme-hint-color); }
    </style>
</head>
<body>

    <!-- Progress Bar -->
    <div class="progress" id="progress">
        <div class="progress-step active" data-step="1"></div>
        <div class="progress-step" data-step="2"></div>
        <div class="progress-step" data-step="3"></div>
        <div class="progress-step" data-step="4"></div>
    </div>

    <!-- ========== ЭКРАН 1: МАСТЕР ========== -->
    <div id="screen1" class="screen active">
        <h2>💈 Выберите мастера</h2>
        <p class="subtitle">Кто будет вас обслуживать?</p>
        <div id="mastersContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="resetAll()">↺ Сброс</button>
            <button class="btn-primary" id="btnToScreen2" disabled onclick="goToScreen(2)">Далее →</button>
        </div>
    </div>

    <!-- ========== ЭКРАН 2: УСЛУГА ========== -->
    <div id="screen2" class="screen">
        <h2>✂️ Выберите услугу</h2>
        <p class="subtitle" id="masterDisplay"></p>
        <div id="servicesContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(1)">← Назад</button>
            <button class="btn-primary" id="btnToScreen3" disabled onclick="goToScreen(3)">Далее →</button>
        </div>
    </div>

    <!-- ========== ЭКРАН 3: ДАТА И ВРЕМЯ ========== -->
    <div id="screen3" class="screen">
        <h2>📅 Выберите дату и время</h2>
        <p class="subtitle" id="serviceDisplay"></p>
        <div style="margin: 16px 0 8px 0; font-weight: 600; font-size: 14px;">📆 Дата</div>
        <div id="datesContainer" class="grid-4"></div>
        <div style="margin: 16px 0 8px 0; font-weight: 600; font-size: 14px;">⏰ Время</div>
        <div id="timesContainer" class="grid-3"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(2)">← Назад</button>
            <button class="btn-primary" id="btnToScreen4" disabled onclick="goToScreen(4)">Далее →</button>
        </div>
    </div>

    <!-- ========== ЭКРАН 4: КОНТАКТЫ ========== -->
    <div id="screen4" class="screen">
        <h2>📞 Ваши контакты</h2>
        <p class="subtitle">Мы свяжемся с вами для подтверждения</p>
        <div class="summary-card" id="bookingPreview"></div>
        <input type="tel" id="phone" placeholder="+7 (XXX) XXX-XX-XX" autocomplete="tel">
        <div id="errorMsg" class="error" style="display:none;"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(3)">← Назад</button>
            <button class="btn-primary" onclick="submitBooking()">✅ Записаться</button>
        </div>
    </div>

    <!-- ========== ЭКРАН 5: ИТОГ ========== -->
    <div id="screen5" class="screen">
        <h2>✅ Запись подтверждена!</h2>
        <div id="finalSummary" class="summary-card"></div>
        <button class="btn-primary" onclick="resetAll()">➕ Новая запись</button>
        <div class="footer">💈 Ждем вас в барбершопе!</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ===== ДАННЫЕ =====
        const MASTERS = [
            { id: 1, name: 'Алексей', emoji: '👨‍🦱' },
            { id: 2, name: 'Дмитрий', emoji: '🧔' },
            { id: 3, name: 'Сергей', emoji: '👨' }
        ];

        const SERVICES = [
            { id: 1, name: 'Стрижка', price: 1000, duration: 30 },
            { id: 2, name: 'Борода', price: 500, duration: 20 },
            { id: 3, name: 'Стрижка + борода', price: 1300, duration: 50 },
            { id: 4, name: 'Детская стрижка', price: 700, duration: 20 }
        ];

        const TIMES = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];

        // ===== СОСТОЯНИЕ =====
        let state = {
            master: null,
            service: null,
            date: null,
            time: null
        };

        // ===== API =====
        const SAVE_API = "https://d5dleakfashkdnoum27j.y3q8o1jq.apigw.yandexcloud.net/";
        const user = tg.initDataUnsafe?.user || { id: 0, first_name: 'Гость', last_name: '' };

        // ===== ФУНКЦИИ НАВИГАЦИИ =====
        function goToScreen(num) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(`screen${num}`).classList.add('active');
            updateProgress(num);
            window.scrollTo(0, 0);
        }

        function updateProgress(step) {
            document.querySelectorAll('.progress-step').forEach((el, i) => {
                el.classList.remove('active', 'done');
                if (i + 1 < step) el.classList.add('done');
                if (i + 1 === step) el.classList.add('active');
            });
        }

        // ===== РЕНДЕРИНГ =====
        function renderMasters() {
            const container = document.getElementById('mastersContainer');
            container.innerHTML = '';
            MASTERS.forEach(m => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `<span>${m.emoji} ${m.name}</span><span class="arrow">→</span>`;
                div.onclick = () => selectMaster(m.id);
                if (state.master?.id === m.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        function renderServices() {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';
            SERVICES.forEach(s => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `
                    <span>${s.name}</span>
                    <span><span class="price">${s.price} ₽</span> · ${s.duration} мин <span class="arrow">→</span></span>
                `;
                div.onclick = () => selectService(s.id);
                if (state.service?.id === s.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        function renderDates() {
            const container = document.getElementById('datesContainer');
            container.innerHTML = '';
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            for (let i = 1; i <= 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayNum = d.getDate();
                const dayName = days[d.getDay() === 0 ? 6 : d.getDay() - 1];
                const dateStr = `${dayNum} ${dayName}`;
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `${dateStr}`;
                div.onclick = () => selectDate(dateStr);
                if (state.date === dateStr) div.classList.add('selected');
                container.appendChild(div);
            }
        }

        function renderTimes() {
            const container = document.getElementById('timesContainer');
            container.innerHTML = '';
            TIMES.forEach(t => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.textContent = t;
                div.onclick = () => selectTime(t);
                if (state.time === t) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        // ===== SELECTORS =====
        function selectMaster(id) {
            state.master = MASTERS.find(m => m.id === id);
            document.getElementById('masterDisplay').textContent = `💈 Мастер: ${state.master.name}`;
            document.getElementById('btnToScreen2').disabled = false;
            renderMasters();
        }

        function selectService(id) {
            state.service = SERVICES.find(s => s.id === id);
            document.getElementById('serviceDisplay').textContent = `✂️ ${state.service.name} — ${state.service.price} ₽`;
            document.getElementById('btnToScreen3').disabled = false;
            renderServices();
        }

        function selectDate(date) {
            state.date = date;
            renderDates();
            checkScreen3Ready();
        }

        function selectTime(time) {
            state.time = time;
            renderTimes();
            checkScreen3Ready();
        }

        function checkScreen3Ready() {
            document.getElementById('btnToScreen4').disabled = !(state.date && state.time);
        }

        // ===== ПРЕДПРОСМОТР =====
        function updatePreview() {
            const preview = document.getElementById('bookingPreview');
            preview.innerHTML = `
                <div class="summary-row"><span class="summary-label">💈 Мастер</span><span class="summary-value">${state.master?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">✂️ Услуга</span><span class="summary-value">${state.service?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">💰 Стоимость</span><span class="summary-value">${state.service?.price || 0} ₽</span></div>
                <div class="summary-row"><span class="summary-label">📅 Дата</span><span class="summary-value">${state.date || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">⏰ Время</span><span class="summary-value">${state.time || '—'}</span></div>
            `;
        }

        // ===== ОТПРАВКА =====
        async function submitBooking() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                document.getElementById('errorMsg').textContent = 'Пожалуйста, введите номер телефона';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            document.getElementById('errorMsg').style.display = 'none';

            const data = {
                master_id: state.master.id,
                master_name: state.master.name,
                service_id: state.service.id,
                service: state.service.name,
                price: state.service.price,
                date: state.date,
                time: state.time,
                phone: phone,
                user_id: user.id,
                first_name: user.first_name || '',
                last_name: user.last_name || ''
            };

            try {
                const response = await fetch(SAVE_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ web_app_data: { data: JSON.stringify(data) } })
                });
                const result = await response.json();

                if (result.ok) {
                    document.getElementById('finalSummary').innerHTML = `
                        <div class="summary-row"><span class="summary-label">💈 Мастер</span><span class="summary-value">${data.master_name}</span></div>
                        <div class="summary-row"><span class="summary-label">✂️ Услуга</span><span class="summary-value">${data.service}</span></div>
                        <div class="summary-row"><span class="summary-label">💰 Стоимость</span><span class="summary-value">${data.price} ₽</span></div>
                        <div class="summary-row"><span class="summary-label">📅 Дата</span><span class="summary-value">${data.date}</span></div>
                        <div class="summary-row"><span class="summary-label">⏰ Время</span><span class="summary-value">${data.time}</span></div>
                        <div class="summary-row"><span class="summary-label">📞 Телефон</span><span class="summary-value">${data.phone}</span></div>
                    `;
                    goToScreen(5);
                } else {
                    throw new Error(result.error || 'Ошибка сохранения');
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = '❌ ' + e.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // ===== СБРОС =====
        function resetAll() {
            state = { master: null, service: null, date: null, time: null };
            document.getElementById('phone').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            renderMasters();
            renderServices();
            renderDates();
            renderTimes();
            document.getElementById('btnToScreen2').disabled = true;
            document.getElementById('btnToScreen3').disabled = true;
            document.getElementById('btnToScreen4').disabled = true;
            goToScreen(1);
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderMasters();
        renderServices();
        renderDates();
        renderTimes();
        document.getElementById('btnToScreen2').disabled = true;
        document.getElementById('btnToScreen3').disabled = true;
        document.getElementById('btnToScreen4').disabled = true;

        // Обновляем предпросмотр перед переходом на экран 4
        document.querySelector('#btnToScreen4').addEventListener('click', updatePreview);
    </script>
</body>
</html>
