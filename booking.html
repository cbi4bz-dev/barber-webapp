<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Barber Lamborghini</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ===== GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.2s;
        }

        /* Акцентный желтый — как у Lamborghini */
        :root {
            --accent: #f8c300;
            --accent-dark: #d4a800;
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-card-hover: #222222;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-radius: 4px; /* Острые углы, как в дизайне Lamborghini */
        }

        /* ===== PROGRESS BAR ===== */
        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 6px;
        }
        .progress-step {
            flex: 1;
            height: 2px;
            background: #333;
            border-radius: 2px;
            transition: background 0.4s ease;
        }
        .progress-step.active {
            background: var(--accent);
        }
        .progress-step.done {
            background: var(--accent-dark);
        }

        /* ===== TYPOGRAPHY ===== */
        h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
            border-bottom: 1px solid #222;
            padding-bottom: 12px;
        }

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            animation: fadeSlide 0.35s ease;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== OPTION CARDS (Lamborghini style) ===== */
        .option-card {
            background: var(--bg-card);
            border: 1px solid #2a2a2a;
            border-radius: var(--border-radius);
            padding: 18px 20px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .option-card:hover {
            background: var(--bg-card-hover);
            border-color: #444;
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .option-card.selected {
            border-color: var(--accent);
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(248, 195, 0, 0.05);
        }
        .option-card .price {
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
        }
        .option-card .arrow {
            color: var(--accent);
            font-size: 18px;
            margin-left: 12px;
        }

        /* ===== GRID (for dates & times) ===== */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .grid-item {
            background: var(--bg-card);
            border: 1px solid #2a2a2a;
            border-radius: var(--border-radius);
            padding: 14px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .grid-item:hover {
            background: var(--bg-card-hover);
            border-color: #444;
        }
        .grid-item:active {
            transform: scale(0.95);
        }
        .grid-item.selected {
            border-color: var(--accent);
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(248, 195, 0, 0.05);
        }
        .grid-item .day {
            font-size: 11px;
            opacity: 0.5;
            display: block;
            margin-top: 4px;
            font-weight: 300;
        }

        /* ===== SECTION TITLES (for date/time labels) ===== */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 20px 0 8px 0;
        }

        /* ===== BUTTONS ===== */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn-primary {
            flex: 1;
            background: var(--accent);
            color: #000000;
            border: none;
            border-radius: var(--border-radius);
            padding: 16px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary:active {
            transform: scale(0.97);
            background: var(--accent-dark);
        }
        .btn-primary:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            flex: 0.5;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #333;
            border-radius: var(--border-radius);
            padding: 16px;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-secondary:active {
            transform: scale(0.97);
            border-color: #666;
        }

        /* ===== INPUT ===== */
        input {
            width: 100%;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid #2a2a2a;
            border-radius: var(--border-radius);
            font-size: 16px;
            color: var(--text-primary);
            box-sizing: border-box;
            margin: 12px 0;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        input::placeholder {
            color: #555;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ===== SUMMARY CARD ===== */
        .summary-card {
            background: var(--bg-card);
            border: 1px solid #2a2a2a;
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 16px 0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .summary-row:last-child {
            border-bottom: none;
        }
        .summary-label {
            color: var(--text-secondary);
        }
        .summary-value {
            font-weight: 600;
            color: var(--accent);
        }

        /* ===== MISC ===== */
        .error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .accent-text {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <!-- ===== PROGRESS ===== -->
    <div class="progress" id="progress">
        <div class="progress-step active" data-step="1"></div>
        <div class="progress-step" data-step="2"></div>
        <div class="progress-step" data-step="3"></div>
        <div class="progress-step" data-step="4"></div>
    </div>

    <!-- ===== SCREEN 1: MASTER ===== -->
    <div id="screen1" class="screen active">
        <h2>🏎️ <span class="accent-text">Master</span></h2>
        <div class="subtitle">Выберите своего гонщика</div>
        <div id="mastersContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="resetAll()">⟲ Сброс</button>
            <button class="btn-primary" id="btnToScreen2" disabled onclick="goToScreen(2)">Далее →</button>
        </div>
    </div>

    <!-- ===== SCREEN 2: SERVICE ===== -->
    <div id="screen2" class="screen">
        <h2>✂️ <span class="accent-text">Service</span></h2>
        <div class="subtitle" id="masterDisplay"></div>
        <div id="servicesContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(1)">← Назад</button>
            <button class="btn-primary" id="btnToScreen3" disabled onclick="goToScreen(3)">Далее →</button>
        </div>
    </div>

    <!-- ===== SCREEN 3: DATE & TIME ===== -->
    <div id="screen3" class="screen">
        <h2>📅 <span class="accent-text">Schedule</span></h2>
        <div class="subtitle" id="serviceDisplay"></div>

        <div class="section-label">📆 Date</div>
        <div id="datesContainer" class="grid-4"></div>

        <div class="section-label">⏰ Time</div>
        <div id="timesContainer" class="grid-3"></div>

        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(2)">← Назад</button>
            <button class="btn-primary" id="btnToScreen4" disabled onclick="goToScreen(4)">Далее →</button>
        </div>
    </div>

    <!-- ===== SCREEN 4: CONTACTS ===== -->
    <div id="screen4" class="screen">
        <h2>📞 <span class="accent-text">Contacts</span></h2>
        <div class="subtitle">Оставьте номер для связи</div>
        <div class="summary-card" id="bookingPreview"></div>
        <input type="tel" id="phone" placeholder="+7 (XXX) XXX-XX-XX" autocomplete="tel">
        <div id="errorMsg" class="error" style="display:none;"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(3)">← Назад</button>
            <button class="btn-primary" onclick="submitBooking()">✅ Confirm</button>
        </div>
    </div>

    <!-- ===== SCREEN 5: FINAL ===== -->
    <div id="screen5" class="screen">
        <h2>🏁 <span class="accent-text">Confirmed</span></h2>
        <div id="finalSummary" class="summary-card"></div>
        <button class="btn-primary" onclick="resetAll()">🔄 New Booking</button>
        <div class="footer">💈 Lamborghini Style Barber</div>
    </div>

    <script>
        // ===== TELEGRAM =====
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ===== DATA =====
        const MASTERS = [
            { id: 1, name: 'Алексей', emoji: '🏁' },
            { id: 2, name: 'Дмитрий', emoji: '🔥' },
            { id: 3, name: 'Сергей', emoji: '⚡' }
        ];

        const SERVICES = [
            { id: 1, name: 'Стрижка', price: 1000, duration: 30 },
            { id: 2, name: 'Борода', price: 500, duration: 20 },
            { id: 3, name: 'Комплекс', price: 1300, duration: 50 },
            { id: 4, name: 'Детская', price: 700, duration: 20 }
        ];

        const TIMES = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];

        // ===== STATE =====
        let state = { master: null, service: null, date: null, time: null };

        // ===== API =====
        const SAVE_API = "https://d5dleakfashkdnoum27j.y3q8o1jq.apigw.yandexcloud.net/";
        const user = tg.initDataUnsafe?.user || { id: 0, first_name: 'Гость' };

        // ===== NAVIGATION =====
        function goToScreen(num) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(`screen${num}`).classList.add('active');
            updateProgress(num);
            window.scrollTo(0, 0);
        }

        function updateProgress(step) {
            document.querySelectorAll('.progress-step').forEach((el, i) => {
                el.classList.remove('active', 'done');
                if (i + 1 < step) el.classList.add('done');
                if (i + 1 === step) el.classList.add('active');
            });
        }

        // ===== RENDER =====
        function renderMasters() {
            const container = document.getElementById('mastersContainer');
            container.innerHTML = '';
            MASTERS.forEach(m => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `<span>${m.emoji} ${m.name}</span><span class="arrow">→</span>`;
                div.onclick = () => selectMaster(m.id);
                if (state.master?.id === m.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        function renderServices() {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';
            SERVICES.forEach(s => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `
                    <span>${s.name}</span>
                    <span><span class="price">${s.price} ₽</span> · ${s.duration}мин <span class="arrow">→</span></span>
                `;
                div.onclick = () => selectService(s.id);
                if (state.service?.id === s.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        function renderDates() {
            const container = document.getElementById('datesContainer');
            container.innerHTML = '';
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            for (let i = 1; i <= 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayNum = d.getDate();
                const dayName = days[d.getDay() === 0 ? 6 : d.getDay() - 1];
                const full = `${dayNum} ${dayName}`;
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `${dayNum}<span class="day">${dayName}</span>`;
                div.onclick = () => selectDate(full);
                if (state.date === full) div.classList.add('selected');
                container.appendChild(div);
            }
        }

        function renderTimes() {
            const container = document.getElementById('timesContainer');
            container.innerHTML = '';
            TIMES.forEach(t => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.textContent = t;
                div.onclick = () => selectTime(t);
                if (state.time === t) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        // ===== SELECTORS =====
        function selectMaster(id) {
            state.master = MASTERS.find(m => m.id === id);
            document.getElementById('masterDisplay').textContent = `🏁 ${state.master.name}`;
            document.getElementById('btnToScreen2').disabled = false;
            renderMasters();
        }

        function selectService(id) {
            state.service = SERVICES.find(s => s.id === id);
            document.getElementById('serviceDisplay').textContent = `✂️ ${state.service.name} — ${state.service.price} ₽`;
            document.getElementById('btnToScreen3').disabled = false;
            renderServices();
        }

        function selectDate(date) {
            state.date = date;
            renderDates();
            checkScreen3Ready();
        }

        function selectTime(time) {
            state.time = time;
            renderTimes();
            checkScreen3Ready();
        }

        function checkScreen3Ready() {
            document.getElementById('btnToScreen4').disabled = !(state.date && state.time);
        }

        function updatePreview() {
            const preview = document.getElementById('bookingPreview');
            preview.innerHTML = `
                <div class="summary-row"><span class="summary-label">🏁 Master</span><span class="summary-value">${state.master?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">✂️ Service</span><span class="summary-value">${state.service?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">💰 Price</span><span class="summary-value">${state.service?.price || 0} ₽</span></div>
                <div class="summary-row"><span class="summary-label">📅 Date</span><span class="summary-value">${state.date || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">⏰ Time</span><span class="summary-value">${state.time || '—'}</span></div>
            `;
        }

        // ===== SUBMIT =====
        async function submitBooking() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                document.getElementById('errorMsg').textContent = 'Введите номер телефона';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            document.getElementById('errorMsg').style.display = 'none';

            const data = {
                master_id: state.master.id,
                master_name: state.master.name,
                service_id: state.service.id,
                service: state.service.name,
                price: state.service.price,
                date: state.date,
                time: state.time,
                phone: phone,
                user_id: user.id,
                first_name: user.first_name || ''
            };

            try {
                const resp = await fetch(SAVE_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ web_app_data: { data: JSON.stringify(data) } })
                });
                const result = await resp.json();
                if (result.ok) {
                    document.getElementById('finalSummary').innerHTML = `
                        <div class="summary-row"><span class="summary-label">🏁 Master</span><span class="summary-value">${data.master_name}</span></div>
                        <div class="summary-row"><span class="summary-label">✂️ Service</span><span class="summary-value">${data.service}</span></div>
                        <div class="summary-row"><span class="summary-label">💰 Price</span><span class="summary-value">${data.price} ₽</span></div>
                        <div class="summary-row"><span class="summary-label">📅 Date</span><span class="summary-value">${data.date}</span></div>
                        <div class="summary-row"><span class="summary-label">⏰ Time</span><span class="summary-value">${data.time}</span></div>
                        <div class="summary-row"><span class="summary-label">📞 Phone</span><span class="summary-value">${data.phone}</span></div>
                    `;
                    goToScreen(5);
                } else {
                    throw new Error(result.error || 'Ошибка');
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = '❌ ' + e.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // ===== RESET =====
        function resetAll() {
            state = { master: null, service: null, date: null, time: null };
            document.getElementById('phone').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            renderMasters();
            renderServices();
            renderDates();
            renderTimes();
            document.getElementById('btnToScreen2').disabled = true;
            document.getElementById('btnToScreen3').disabled = true;
            document.getElementById('btnToScreen4').disabled = true;
            goToScreen(1);
        }

        // ===== INIT =====
        renderMasters();
        renderServices();
        renderDates();
        renderTimes();
        document.getElementById('btnToScreen2').disabled = true;
        document.getElementById('btnToScreen3').disabled = true;
        document.getElementById('btnToScreen4').disabled = true;

        document.querySelector('#btnToScreen4').addEventListener('click', updatePreview);
    </script>
</body>
</html>
