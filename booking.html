<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lamborghini Barbershop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ----- БАЗОВЫЕ СТИЛИ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px 20px 30px;
            min-height: 100vh;
        }

        /* ----- БРЕНДИНГ (КАК НА КАРТИНКЕ) ----- */
        .brand {
            text-align: center;
            margin-bottom: 24px;
        }
        .brand h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #f8c300;
        }
        .brand .slogan {
            font-size: 14px;
            letter-spacing: 4px;
            color: #aaa;
            margin-top: 4px;
        }

        /* ----- ПРОГРЕСС (ПОЛОСКИ) ----- */
        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 6px;
        }
        .progress-step {
            flex: 1;
            height: 2px;
            background: #333;
            border-radius: 2px;
            transition: background 0.3s;
        }
        .progress-step.active {
            background: #f8c300;
        }
        .progress-step.done {
            background: #f8c300;
            opacity: 0.3;
        }

        /* ----- ЭКРАНЫ ----- */
        .screen {
            display: none;
            animation: fadeSlide 0.3s ease;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- ЗАГОЛОВКИ ЭКРАНОВ ----- */
        .screen-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f8c300;
            margin-bottom: 4px;
        }
        .screen-subtitle {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* ----- КАРТОЧКИ (МАСТЕР / УСЛУГА) ----- */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 16px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.15s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card.selected {
            border-color: #f8c300;
            box-shadow: 0 0 30px rgba(248, 195, 0, 0.05);
        }
        .card .left {
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card .right {
            text-align: right;
        }
        .card .price {
            font-size: 18px;
            font-weight: 700;
            color: #f8c300;
        }
        .card .duration {
            font-size: 11px;
            color: #666;
        }
        .card .arrow {
            color: #f8c300;
            font-size: 18px;
            margin-left: 12px;
        }

        /* ----- КАЛЕНДАРЬ (СЕТКА) ----- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin: 16px 0;
        }

        .cal-day {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 12px 4px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s ease;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .cal-day:active {
            transform: scale(0.95);
        }
        .cal-day.selected {
            border-color: #f8c300;
            box-shadow: 0 0 20px rgba(248, 195, 0, 0.05);
        }
        .cal-day .day-name {
            font-size: 9px;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .cal-day.weekend .day-name {
            color: #f8c300;
        }
        .cal-day.past {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ----- ВРЕМЯ (СЕТКА) ----- */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .time-slot {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s ease;
        }
        .time-slot:active {
            transform: scale(0.95);
        }
        .time-slot.selected {
            border-color: #f8c300;
            box-shadow: 0 0 20px rgba(248, 195, 0, 0.05);
        }

        /* ----- КНОПКИ НАВИГАЦИИ ----- */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn-primary {
            flex: 1;
            background: #f8c300;
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.15s ease;
        }
        .btn-primary:active {
            transform: scale(0.97);
            background: #e0b000;
        }
        .btn-primary:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            flex: 0.4;
            background: transparent;
            color: #666;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.15s ease;
        }
        .btn-secondary:active {
            transform: scale(0.97);
            border-color: #666;
        }

        /* ----- ПОЛЕ ВВОДА ----- */
        input {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-size: 16px;
            color: #fff;
            box-sizing: border-box;
            margin: 12px 0;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #f8c300;
        }
        input::placeholder {
            color: #444;
        }

        /* ----- ИТОГОВАЯ КАРТОЧКА (ПОДТВЕРЖДЕНИЕ) ----- */
        .summary-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 20px;
            margin: 16px 0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .summary-row:last-child {
            border-bottom: none;
        }
        .summary-label {
            color: #666;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .summary-value {
            font-weight: 600;
            color: #f8c300;
            text-transform: uppercase;
            font-size: 13px;
        }

        /* ----- ОШИБКИ, ПОДВАЛ ----- */
        .error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 9px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- БРЕНДИНГ -->
    <!-- ============================================================ -->
    <div class="brand">
        <h1>Lamborghini</h1>
        <div class="slogan">Идеальная стрижка. Безупречный стиль.</div>
    </div>

    <!-- ============================================================ -->
    <!-- ПРОГРЕСС -->
    <!-- ============================================================ -->
    <div class="progress" id="progress">
        <div class="progress-step active" data-step="1"></div>
        <div class="progress-step" data-step="2"></div>
        <div class="progress-step" data-step="3"></div>
        <div class="progress-step" data-step="4"></div>
    </div>

    <!-- ============================================================ -->
    <!-- ЭКРАН 1: ВЫБОР МАСТЕРА -->
    <!-- ============================================================ -->
    <div id="screen1" class="screen active">
        <div class="screen-title">Шаг 1</div>
        <div class="screen-subtitle">Выбор мастера</div>
        <div id="mastersContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="resetAll()">Сброс</button>
            <button class="btn-primary" id="btnToScreen2" disabled onclick="goToScreen(2)">Далее →</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ЭКРАН 2: ВЫБОР УСЛУГИ -->
    <!-- ============================================================ -->
    <div id="screen2" class="screen">
        <div class="screen-title">Шаг 2</div>
        <div class="screen-subtitle">Выбор услуги</div>
        <div id="masterDisplay" style="font-size:13px; color:#666; margin-bottom:16px;"></div>
        <div id="servicesContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(1)">← Назад</button>
            <button class="btn-primary" id="btnToScreen3" disabled onclick="goToScreen(3)">Далее →</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ЭКРАН 3: ДАТА И ВРЕМЯ -->
    <!-- ============================================================ -->
    <div id="screen3" class="screen">
        <div class="screen-title">Шаг 3</div>
        <div class="screen-subtitle">Дата и время</div>
        <div id="serviceDisplay" style="font-size:13px; color:#666; margin-bottom:16px;"></div>

        <div style="font-size:11px; color:#666; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;">Выберите дату</div>
        <div id="datesContainer" class="calendar-grid"></div>

        <div style="font-size:11px; color:#666; letter-spacing:1px; text-transform:uppercase; margin:16px 0 8px;">Выберите время</div>
        <div id="timesContainer" class="time-grid"></div>

        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(2)">← Назад</button>
            <button class="btn-primary" id="btnToScreen4" disabled onclick="goToScreen(4)">Далее →</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ЭКРАН 4: КОНТАКТЫ / ПОДТВЕРЖДЕНИЕ -->
    <!-- ============================================================ -->
    <div id="screen4" class="screen">
        <div class="screen-title">Шаг 4</div>
        <div class="screen-subtitle">Подтверждение</div>
        <div class="summary-card" id="bookingPreview"></div>
        <input type="tel" id="phone" placeholder="+7 (XXX) XXX-XX-XX" autocomplete="tel">
        <div id="errorMsg" class="error" style="display:none;"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" onclick="goToScreen(3)">← Назад</button>
            <button class="btn-primary" onclick="submitBooking()">Готово</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ЭКРАН 5: ФИНАЛ -->
    <!-- ============================================================ -->
    <div id="screen5" class="screen">
        <div class="screen-title">Запись подтверждена!</div>
        <div class="screen-subtitle" style="font-size:24px; color:#f8c300;">Ждём вас</div>
        <div id="finalSummary" class="summary-card"></div>
        <button class="btn-primary" onclick="resetAll()" style="margin-top:12px;">➕ Новая запись</button>
        <div class="footer">Lamborghini Barbershop</div>
    </div>

    <script>
        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ TELEGRAM
        // ============================================================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ============================================================
        // ДАННЫЕ
        // ============================================================
        const MASTERS = [
            { id: 1, name: 'Alex' },
            { id: 2, name: 'Max' },
            { id: 3, name: 'Leo' }
        ];

        const SERVICES = [
            { id: 1, name: 'МУЖСКАЯ СТРИЖКА', price: 2500, duration: 60 },
            { id: 2, name: 'СТРИЖКА + БОРОДА', price: 3500, duration: 90 },
            { id: 3, name: 'КОРОЛЕВСКОЕ БРИТЬЕ', price: 2000, duration: 45 },
            { id: 4, name: 'СТРИЖКА ДЕТСКАЯ', price: 1800, duration: 45 },
            { id: 5, name: 'КАМУФЛЯЖ СЕДИНЫ', price: 2200, duration: 30 }
        ];

        const TIMES = ['10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '14:30', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00'];

        // ============================================================
        // СОСТОЯНИЕ
        // ============================================================
        let state = {
            master: null,
            service: null,
            date: null,
            time: null
        };

        // ============================================================
        // API (СОХРАНЕНИЕ)
        // ============================================================
        const SAVE_API = "https://d5dleakfashkdnoum27j.y3q8o1jq.apigw.yandexcloud.net/";
        const user = tg.initDataUnsafe?.user || { id: 0, first_name: 'Гость' };

        // ============================================================
        // НАВИГАЦИЯ
        // ============================================================
        function goToScreen(num) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(`screen${num}`).classList.add('active');
            updateProgress(num);
            window.scrollTo(0, 0);
        }

        function updateProgress(step) {
            document.querySelectorAll('.progress-step').forEach((el, i) => {
                el.classList.remove('active', 'done');
                if (i + 1 < step) el.classList.add('done');
                if (i + 1 === step) el.classList.add('active');
            });
        }

        // ============================================================
        // РЕНДЕРИНГ МАСТЕРОВ
        // ============================================================
        function renderMasters() {
            const container = document.getElementById('mastersContainer');
            container.innerHTML = '';
            MASTERS.forEach(m => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span class="left">${m.name}</span><span class="arrow">→</span>`;
                div.onclick = () => selectMaster(m.id);
                if (state.master?.id === m.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        // ============================================================
        // РЕНДЕРИНГ УСЛУГ
        // ============================================================
        function renderServices() {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';
            SERVICES.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <span class="left">${s.name}</span>
                    <span class="right">
                        <div class="duration">${s.duration} МИН</div>
                        <div class="price">${s.price.toLocaleString()} ₽</div>
                    </span>
                `;
                div.onclick = () => selectService(s.id);
                if (state.service?.id === s.id) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        // ============================================================
        // РЕНДЕРИНГ КАЛЕНДАРЯ (ПОЛНАЯ СЕТКА МЕСЯЦА)
        // ============================================================
        function renderDates() {
            const container = document.getElementById('datesContainer');
            container.innerHTML = '';
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            // Заголовок месяца
            const monthNames = ['ЯНВ', 'ФЕВ', 'МАР', 'АПР', 'МАЙ', 'ИЮН', 'ИЮЛ', 'АВГ', 'СЕН', 'ОКТ', 'НОЯ', 'ДЕК'];
            const monthHeader = document.createElement('div');
            monthHeader.style.cssText =
                'grid-column: span 7; text-align:center; font-size:14px; font-weight:600; color:#f8c300; letter-spacing:2px; padding:4px 0;';
            monthHeader.textContent = `${monthNames[currentMonth]} ${currentYear}`;
            container.appendChild(monthHeader);

            // Дни недели
            const dayNames = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            dayNames.forEach(name => {
                const div = document.createElement('div');
                div.style.cssText =
                    'font-size:9px; color:#444; text-align:center; text-transform:uppercase; letter-spacing:0.5px; padding:4px 0;';
                div.textContent = name;
                container.appendChild(div);
            });

            // Пустые ячейки до первого дня месяца
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const emptyDays = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < emptyDays; i++) {
                const div = document.createElement('div');
                div.style.cssText = 'visibility:hidden;';
                container.appendChild(div);
            }

            // Дни месяца
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const todayDate = today.getDate();

            for (let i = 1; i <= daysInMonth; i++) {
                const div = document.createElement('div');
                div.className = 'cal-day';
                const isWeekend = (new Date(currentYear, currentMonth, i).getDay() % 6 === 0);
                if (isWeekend) div.classList.add('weekend');

                const dayNum = document.createElement('div');
                dayNum.style.fontSize = '16px';
                dayNum.style.fontWeight = '600';
                dayNum.textContent = i;

                const dayName = document.createElement('div');
                dayName.className = 'day-name';
                const dayOfWeek = new Date(currentYear, currentMonth, i).getDay();
                dayName.textContent = dayNames[dayOfWeek === 0 ? 6 : dayOfWeek - 1];

                div.appendChild(dayNum);
                div.appendChild(dayName);

                const dateStr = `${i} ${dayName.textContent}`;

                // Прошедшие дни затемняем
                if (i < todayDate) {
                    div.classList.add('past');
                } else {
                    div.onclick = () => selectDate(dateStr);
                }

                if (state.date === dateStr) div.classList.add('selected');
                container.appendChild(div);
            }
        }

        // ============================================================
        // РЕНДЕРИНГ ВРЕМЕНИ
        // ============================================================
        function renderTimes() {
            const container = document.getElementById('timesContainer');
            container.innerHTML = '';
            TIMES.forEach(t => {
                const div = document.createElement('div');
                div.className = 'time-slot';
                div.textContent = t;
                div.onclick = () => selectTime(t);
                if (state.time === t) div.classList.add('selected');
                container.appendChild(div);
            });
        }

        // ============================================================
        // ВЫБОР
        // ============================================================
        function selectMaster(id) {
            state.master = MASTERS.find(m => m.id === id);
            document.getElementById('masterDisplay').textContent = `Мастер: ${state.master.name}`;
            document.getElementById('btnToScreen2').disabled = false;
            renderMasters();
        }

        function selectService(id) {
            state.service = SERVICES.find(s => s.id === id);
            document.getElementById('serviceDisplay').textContent = `${state.service.name} — ${state.service.price} ₽`;
            document.getElementById('btnToScreen3').disabled = false;
            renderServices();
        }

        function selectDate(date) {
            state.date = date;
            renderDates();
            checkScreen3Ready();
        }

        function selectTime(time) {
            state.time = time;
            renderTimes();
            checkScreen3Ready();
        }

        function checkScreen3Ready() {
            document.getElementById('btnToScreen4').disabled = !(state.date && state.time);
        }

        // ============================================================
        // ПРЕДПРОСМОТР (ЭКРАН 4)
        // ============================================================
        function updatePreview() {
            const preview = document.getElementById('bookingPreview');
            preview.innerHTML = `
                <div class="summary-row"><span class="summary-label">Мастер</span><span class="summary-value">${state.master?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">Услуга</span><span class="summary-value">${state.service?.name || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">Длительность</span><span class="summary-value">${state.service?.duration || 0} МИН</span></div>
                <div class="summary-row"><span class="summary-label">Стоимость</span><span class="summary-value">${state.service?.price?.toLocaleString() || 0} ₽</span></div>
                <div class="summary-row"><span class="summary-label">Дата</span><span class="summary-value">${state.date || '—'}</span></div>
                <div class="summary-row"><span class="summary-label">Время</span><span class="summary-value">${state.time || '—'}</span></div>
            `;
        }

        // ============================================================
        // ОТПРАВКА ЗАПИСИ
        // ============================================================
        async function submitBooking() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                document.getElementById('errorMsg').textContent = 'Введите номер телефона';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            document.getElementById('errorMsg').style.display = 'none';

            const data = {
                master_id: state.master.id,
                master_name: state.master.name,
                service_id: state.service.id,
                service: state.service.name,
                price: state.service.price,
                duration: state.service.duration,
                date: state.date,
                time: state.time,
                phone: phone,
                user_id: user.id,
                first_name: user.first_name || ''
            };

            try {
                const response = await fetch(SAVE_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ web_app_data: { data: JSON.stringify(data) } })
                });
                const result = await response.json();

                if (result.ok) {
                    document.getElementById('finalSummary').innerHTML = `
                        <div class="summary-row"><span class="summary-label">Мастер</span><span class="summary-value">${data.master_name}</span></div>
                        <div class="summary-row"><span class="summary-label">Услуга</span><span class="summary-value">${data.service}</span></div>
                        <div class="summary-row"><span class="summary-label">Длительность</span><span class="summary-value">${data.duration} МИН</span></div>
                        <div class="summary-row"><span class="summary-label">Стоимость</span><span class="summary-value">${data.price.toLocaleString()} ₽</span></div>
                        <div class="summary-row"><span class="summary-label">Дата</span><span class="summary-value">${data.date}</span></div>
                        <div class="summary-row"><span class="summary-label">Время</span><span class="summary-value">${data.time}</span></div>
                        <div class="summary-row"><span class="summary-label">Телефон</span><span class="summary-value">${data.phone}</span></div>
                    `;
                    goToScreen(5);
                } else {
                    throw new Error(result.error || 'Ошибка сохранения');
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = '❌ ' + e.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // ============================================================
        // СБРОС
        // ============================================================
        function resetAll() {
            state = { master: null, service: null, date: null, time: null };
            document.getElementById('phone').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            renderMasters();
            renderServices();
            renderDates();
            renderTimes();
            document.getElementById('btnToScreen2').disabled = true;
            document.getElementById('btnToScreen3').disabled = true;
            document.getElementById('btnToScreen4').disabled = true;
            goToScreen(1);
        }

        // ============================================================
        // ЗАПУСК
        // ============================================================
        renderMasters();
        renderServices();
        renderDates();
        renderTimes();
        document.getElementById('btnToScreen2').disabled = true;
        document.getElementById('btnToScreen3').disabled = true;
        document.getElementById('btnToScreen4').disabled = true;

        document.querySelector('#btnToScreen4').addEventListener('click', updatePreview);
    </script>
</body>
</html>
